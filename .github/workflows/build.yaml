name: Build

on: [workflow_dispatch]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Build
      run: |
        python -m pip install --upgrade pip
        pip install build
        python -m build
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: artifact
        path: dist/*
